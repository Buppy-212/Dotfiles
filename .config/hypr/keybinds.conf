$mainMod = SUPER

bind = $mainMod, SPACE, exec, $HOME/.config/wofi/scripts/desktop.sh
bind = $mainMod, RETURN, exec, kitty
bind = $mainMod, W, exec, firefox
bind = ALT, code:21, exec, galculator
bind = $mainMod, E, exec, thunar


bind = $mainMod, M, exec, wlogout --protocol layer-shell
bind = $mainMod SHIFT, M, exit,
bind = ,code:107, exec, grim -g "$(slurp)" - | swappy -f -
bind = $mainMod, O, exec, $HOME/.config/wofi/scripts/wallpaper-switcher.sh
bind = $mainMod, TAB, exec, hyprshade toggle blue-light-filter
bind = ALT, TAB, exec, $HOME/.config/wofi/scripts/task-switcher.sh


# Window Controls
bind = $mainMod, V, togglefloating,
bind = $mainMod SHIFT, V, exec, hyprctl keyword windowrule float,title:
bind = $mainMod CTRL, V, exec, hyprctl keyword windowrule tile,title:
bind = $mainMod, Q, killactive,
bind = $mainMod, P, pseudo,
bind = $mainMod, S, togglesplit,
bind = $mainMod, F, fullscreen, 1
bind = $mainMod SHIFT, F, fullscreen
bind = $mainMod SHIFT, BACKSPACE, exec, pkill waybar
bind = $mainMod, BACKSPACE, exec, hyprctl reload

# Move focus with mainMod + arrow keys
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# Switch windows with mainMod + SHIFT + arrow keys
bind = $mainMod SHIFT, H, swapwindow, l
bind = $mainMod SHIFT, L, swapwindow, r
bind = $mainMod SHIFT, K, swapwindow, u
bind = $mainMod SHIFT, J, swapwindow, d

# Switch monitor a window is on with mainMod + ALT + arrow keys
bind = $mainMod ALT, H, movewindow, mon:1
bind = $mainMod ALT, L, movewindow, mon:0

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_up, workspace, r+1
bind = $mainMod CTRL, L, workspace, r+1
bind = $mainMod CTRL, H, workspace, r-1
bind = $mainMod, mouse_down, workspace, r-1

# New workspaces
bind = $mainMod CTRL, up, workspace, empty
bind = $mainMod CTRL SHIFT, up, movetoworkspace, empty
bind = $mainMod CTRL SHIFT, H, movetoworkspace, r-1
bind = $mainMod CTRL SHIFT,L, movetoworkspace, r+1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
bind = $mainMod, code:85, resizeactive, 2% 0
bind = $mainMod SHIFT, code:85, resizeactive, 5% 0
bind = $mainMod, code:88, resizeactive, 0 2%
bind = $mainMod SHIFT, code:88, resizeactive, 0 5%
bind = $mainMod, code:83, resizeactive, -2% 0
bind = $mainMod SHIFT, code:83, resizeactive, -5% 0
bind = $mainMod, code:80, resizeactive, 0 -2%
bind = $mainMod SHIFT, code:80, resizeactive, 0 -5%

