$configs =  ~/.config/hypr

monitor=eDP-1,preferred,0x0,1
monitor=HDMI-A-1,preferred,-1920x0,1

source = $configs/startup.conf
source = $configs/windowrules.conf
source = $configs/keybinds.conf
source = $configs/media-binds.conf
source = $configs/env_var.conf

workspace=1, persistent:true, monitor:eDP-1
workspace=2, persistent:true, monitor:eDP-1
workspace=3, persistent:true, monitor:eDP-1
workspace=4, persistent:true, monitor:eDP-1
workspace=5, persistent:true, monitor:eDP-1
workspace=6, persistent:true, monitor:HDMI-A-1
workspace=7, persistent:true, monitor:HDMI-A-1
workspace=8, persistent:true, monitor:HDMI-A-1
workspace=9, persistent:true, monitor:HDMI-A-1
workspace=10, persistent:true, monitor:HDMI-A-1

input {
    kb_layout = gb
    kb_options = ctrl:nocaps, lv3:ralt_alt
    follow_mouse = 1
    mouse_refocus=false

    touchpad {
        natural_scroll = no
    }

    sensitivity = 0
}

general {
    gaps_in =0 #1
    gaps_out = 0 #1
    border_size = 0 #1
    col.active_border=rgb(cdd6f4)
    col.inactive_border = rgba(595959aa)

    layout = dwindle
}

misc {
    disable_hyprland_logo = yes
    disable_splash_rendering = yes
}

decoration {
    rounding = 0 #5
    
    blur {
        enabled = true
        size = 7
        passes = 4
        new_optimizations = true
    }

    blurls = lockscreen

    drop_shadow = yes
    shadow_range = 4
    shadow_render_power = 3
    col.shadow = rgba(1a1a1aee)
    dim_inactive = true
    dim_strength = 0.1
}

animations {
    enabled = yes

    bezier = move, 0.10, 0.9, 0.1, 1.05
    bezier = switch, 0.68, -0.2, 0.265, 1.2
    bezier = open, 0.16, 1, 0.3, 1
    bezier = close, 0.3, 1, 0.16, 1

    animation = windowsMove, 1, 3, move, slide
    animation = windowsOut, 1, 7, close, popin
    animation = windowsIn, 1, 7, open, popin
    animation = border, 1, 10, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 3, switch, slide
}

xwayland {
  force_zero_scaling = true
}

dwindle {
    # See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
    pseudotile = yes # master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = yes # you probably want this
}

gestures {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    workspace_swipe = on
}
