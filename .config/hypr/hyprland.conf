$configs =  ~/.config/hypr

monitor=eDP-1,preferred,0x0,1
monitor=HDMI-A-1,preferred,1920x0,1

source = $configs/startup.conf
source = $configs/windowrules.conf
source = $configs/keybinds.conf
source = $configs/media-binds.conf
source = $configs/env_var.conf

input {
    kb_layout = gb
    kb_options = ctrl:nocaps, lv3:ralt_alt
    follow_mouse = 1
    sensitivity = 0
    accel_profile=flat
    mouse_refocus = false

    touchpad {
        natural_scroll = no
    }
}

general {
    gaps_in = 0
    gaps_out = 0
    border_size = 0
    col.active_border = rgb(82aaff) #82aaff
    col.inactive_border = rgba(2f334daa) #2f334daa
    layout = dwindle
}

misc {
    disable_hyprland_logo = yes
    disable_splash_rendering = yes
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
}

decoration {
    rounding = 0
    
    blur {
        enabled = true
        size = 7
        passes = 4
        new_optimizations = true
    }

    blurls = lockscreen
    drop_shadow = yes
    shadow_range = 4
    shadow_render_power = 3
    col.shadow = rgba(1a1a1aee) #1a1a1aee
    dim_inactive = true
    dim_strength = 0.1
}

animations {
    enabled = yes

    bezier = switch, 0.68, 0, 0.265, 1
    bezier = open, 0.16, 1, 0.3, 1
    bezier = close, 0.3, 1, 0.16, 1

    animation = windowsMove, 1, 3, switch, slide
    animation = windowsOut, 1, 7, close, slide
    animation = windowsIn, 1, 7, open, slide
    animation = border, 1, 10, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 3, switch, slidevert
}

xwayland {
  force_zero_scaling = true
}

dwindle {
    pseudotile = yes
    preserve_split = yes
}

gestures {
    workspace_swipe = on
}
