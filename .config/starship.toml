command_timeout = 5000
add_newline = true

[username]
style_user = "bg:#3B4252"
style_root = "bg:#3B4252"
show_always = true
format = '[$user ]($style)'

[directory]
style = "bg:#434C5E"
format = "[ $path ]($style)"
truncation_length = 2
truncation_symbol = "‚Ä¶/"

